name: Build GPU Worker Image

on:
  workflow_dispatch:
    inputs:
      preload_model:
        description: "Download model weights into the image during build"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/gpu-worker-image.yml"
      - "services/gpu-worker/**"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/acspock/yb-dumps-gpu-worker

jobs:
  build:
    name: Build and push GPU worker
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./services/gpu-worker
          file: ./services/gpu-worker/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            PRELOAD_MODEL=${{ github.event_name == 'workflow_dispatch' && inputs.preload_model || 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
